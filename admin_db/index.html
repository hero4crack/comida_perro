<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Base de Datos - NaturalPet</title>
    <link href="https://unpkg.com/tabulator-tables@5.5.2/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/tabulator-tables@5.5.2/dist/js/tabulator.min.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>🎛️ Panel de Control NaturalPet</h1>
            <p>Doble clic en cualquier celda para editar clientes, mascotas o pedidos en tiempo real, o usa la consola SQL abajo.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarTabla('clientes', this)">👥 Clientes</button>
            <button class="tab-btn" onclick="cambiarTabla('mascotas', this)">🐾 Mascotas</button>
            <button class="tab-btn" onclick="cambiarTabla('pedidos', this)">📦 Pedidos</button>
            <button class="tab-btn" onclick="cambiarTabla('reporte_ventas_diarias', this)">📊 Reporte Ventas</button>
        </div>

        <div id="tabla-contenedor"></div>

        <div class="sql-console">
            <h2>💻 Consola SQL Directa (Supabase)</h2>
            <textarea id="sql-query" placeholder="Escribe tu consulta SQL aquí... Ejemplo: SELECT * FROM mascotas WHERE tipo = 'Perro';"></textarea>
            <button class="btn-execute" onclick="ejecutarSQL()">Ejecutar Consulta</button>
            
            <div id="sql-resultado-container">
                <h3>Resultado:</h3>
                <div id="tabla-sql-resultado"></div>
                <pre id="sql-error" style="display:none; background: #500; color: #fff; padding: 10px; border-radius: 4px; font-family: monospace;"></pre>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="gestor.js"></script>
</body>
</html>
