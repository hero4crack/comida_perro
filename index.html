<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimalPet - Comida Natural para Perros y Gatos</title>

    <!-- Supabase JS SDK v2 (para detectar sesión y redirigir si ya está logueado) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- CSS mínimo para la landing -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!--
        INDEX.HTML — PÁGINA DE INICIO (LANDING)
        Punto de entrada principal al abrir la app.
        - Si el usuario ya tiene sesión activa → redirige a app.html
        - Si no → muestra la landing de marketing
        Los botones "Iniciar Sesión" / "Crear Mi Plan" navegan a login.html
    -->
    <div id="app">
        <div class="loading-container">
            <div style="text-align:center">
                <div class="spinner"></div>
                <p style="margin-top:1rem;color:#6b7280;font-size:0.875rem">Cargando AnimalPet...</p>
            </div>
        </div>
    </div>

    <!-- Scripts mínimos para la landing -->
    <script src="js/config/supabase.js"></script>
    <script src="js/views/landingView.js"></script>

    <script>
        // Exponer toggleFaq en window (los handlers onclick lo usan)
        window.toggleFaq = toggleFaq;
        window.goToAuth = goToAuth;

        (async () => {
            try {
                // Si ya hay sesión, saltar directo al dashboard
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    console.log('👤 Sesión activa, redirigiendo a app.html');
                    window.location.href = 'app.html';
                    return;
                }
            } catch (err) {
                console.warn('No se pudo verificar sesión, mostrando landing:', err.message);
            }

            // No hay sesión → mostrar la landing
            document.getElementById('app').innerHTML = renderLanding();
        })();
    </script>
</body>
</html>
