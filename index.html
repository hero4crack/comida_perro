<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimalPet - Comida Natural para Perros y Gatos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --emerald-50:#ecfdf5;
            --emerald-100:#d1fae5;
            --emerald-500:#10b981;
            --emerald-600:#059669;
            --emerald-700:#047857;
            --gray-50:#f9fafb;
            --gray-100:#f3f4f6;
            --gray-200:#e5e7eb;
            --gray-300:#d1d5db;
            --gray-400:#9ca3af;
            --gray-500:#6b7280;
            --gray-600:#4b5563;
            --gray-700:#374151;
            --gray-800:#1f2937;
            --gray-900:#111827;
            --white:#fff;
            --red-100:#fee2e2;
            --red-600:#dc2626;
            --red-700:#b91c1c;
            --red-800:#991b1b;
            --yellow-100:#fef3c7;
            --yellow-800:#92400e;
            --orange-100:#fed7aa;
            --purple-100:#ede9fe;
            --purple-800:#5b21b6;
            --green-100:#d1fae5;
            --green-700:#047857;
            --blue-100:#dbeafe;
            --blue-700:#1d4ed8;
            --amber-100:#fef3c7;
            --amber-600:#d97706;
            --indigo-100:#e0e7ff;
            --radius:0.75rem;
        }
        button{cursor:pointer;font-family:inherit}
        input,select,textarea{font-family:inherit;font-size:0.875rem}
        .app{min-height:100vh;display:flex;flex-direction:column}
        .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.75rem}
        .header-logo .icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:flex;align-items:center;justify-content:center;font-size:22px}
        .header-logo h1{font-size:1.1rem;font-weight:700;color:var(--gray-900)}
        .header-logo p{font-size:0.7rem;color:var(--gray-500)}
        .main{flex:1;max-width:960px;width:100%;margin:0 auto;padding:1.5rem 1rem}
        .footer{border-top:1px solid var(--gray-200);background:rgba(255,255,255,.6);padding:1rem;text-align:center;margin-top:auto}
        .footer p{font-size:0.75rem;color:var(--gray-400)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.375rem;padding:0.5rem 1rem;border-radius:var(--radius);font-size:0.875rem;font-weight:500;border:none;transition:all .15s}
        .btn-primary{background:var(--emerald-600);color:var(--white)}.btn-primary:hover{background:var(--emerald-700)}
        .btn-outline{background:transparent;border:1px solid var(--gray-200);color:var(--gray-700)}.btn-outline:hover{background:var(--gray-50)}
        .btn-ghost{background:transparent;color:var(--gray-500)}.btn-ghost:hover{background:var(--gray-100)}
        .btn-danger{background:transparent;color:var(--red-600)}.btn-danger:hover{background:var(--red-100)}
        .btn-success{background:var(--emerald-600);color:var(--white)}.btn-success:hover{background:var(--emerald-700)}
        .btn-warning{background:var(--amber-600);color:var(--white)}.btn-warning:hover{background:var(--amber-700)}
        .btn-sm{padding:0.3rem 0.65rem;font-size:0.8rem}
        .btn-icon{font-size:1rem}
        .card{background:var(--white);border:1px solid var(--gray-200);border-radius:0.75rem;overflow:hidden}
        .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem}
        .card-header h2{font-size:1rem;font-weight:600}
        .card-body{padding:1.25rem}
        .form-group{margin-bottom:0.75rem}
        .form-group label{display:block;font-size:0.8rem;font-weight:500;margin-bottom:0.25rem;color:var(--gray-700)}
        .form-control{width:100%;padding:0.5rem 0.75rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:0.875rem;transition:border-color .15s;outline:none}
        .form-control:focus{border-color:var(--emerald-500);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
        .form-row{display:grid;gap:0.75rem}
        .form-row-2{grid-template-columns:1fr 1fr}
        .form-row-3{grid-template-columns:1fr 1fr 1fr}
        .form-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
        @media(max-width:640px){.form-row-2,.form-row-3,.form-row-4{grid-template-columns:1fr}}
        .auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;background:linear-gradient(135deg,var(--emerald-50),var(--white))}
        .auth-card{width:100%;max-width:400px;background:var(--white);border-radius:0.75rem;box-shadow:0 10px 40px rgba(0,0,0,.08);border:1px solid var(--gray-200)}
        .auth-card .card-header{text-align:center;padding:1.5rem 1.5rem 0.5rem}
        .auth-card .card-body{padding:0.5rem 1.5rem 1.5rem}
        .auth-toggle{text-align:center;margin-top:1rem;font-size:0.8rem}
        .tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:1.5rem;overflow-x:auto}
        .tab{padding:0.6rem 1rem;font-size:0.8rem;font-weight:500;color:var(--gray-500);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s;white-space:nowrap}
        .tab:hover{color:var(--gray-700)}
        .tab.active{color:var(--emerald-600);border-bottom-color:var(--emerald-600);font-weight:600}
        .badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;font-size:0.7rem;font-weight:600;gap:4px}
        .badge-default{background:var(--gray-200);color:var(--gray-700)}
        .badge-red{background:var(--red-100);color:var(--red-800)}
        .badge-yellow{background:var(--yellow-100);color:var(--yellow-800)}
        .badge-orange{background:var(--orange-100);color:var(--orange-800)}
        .badge-purple{background:var(--purple-100);color:var(--purple-800)}
        .badge-green{background:var(--green-100);color:var(--green-700)}
        .badge-blue{background:var(--blue-100);color:var(--blue-700)}
        .badge-amber{background:var(--amber-100);color:var(--amber-600)}
        .badge-pending{background:var(--yellow-100);color:var(--yellow-800)}
        .badge-progress{background:var(--blue-100);color:var(--blue-700)}
        .badge-completed{background:var(--green-100);color:var(--green-700)}
        .sale-row{border:1px solid var(--gray-200);border-radius:0.5rem;margin-bottom:0.5rem;overflow:hidden;background:var(--white)}
        .sale-row-header{display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;padding:0.75rem 1rem;cursor:pointer;transition:background .1s}
        .sale-row-header:hover{background:var(--gray-50)}
        .sale-row-header .lote{font-family:monospace;font-size:0.7rem;background:var(--gray-100);padding:2px 6px;border-radius:4px}
        .sale-row-header .propietario{font-weight:600;font-size:0.85rem}
        .sale-row-header .monto{margin-left:auto;font-weight:700;color:var(--emerald-700);font-size:0.9rem}
        .sale-row-header .monto-pending{color:var(--gray-400)}
        .sale-row-detail{border-top:1px solid var(--gray-100);padding:1rem;background:var(--gray-50);display:none}
        .sale-row-detail.open{display:block}
        .sale-row-detail .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
        .sale-row-detail h4{font-size:0.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);margin-bottom:0.4rem}
        .sale-row-detail .monto-big{font-size:1.1rem;font-weight:700;color:var(--emerald-700);margin-top:0.25rem}
        .pet-card{display:flex;align-items:center;justify-content:space-between;padding:0.75rem;border:1px solid var(--gray-200);border-radius:0.5rem;background:var(--white);margin-bottom:0.5rem}
        .pet-card .pet-info{display:flex;align-items:center;gap:0.75rem}
        .pet-card .pet-icon{width:36px;height:36px;border-radius:8px;background:var(--amber-100);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
        .pet-card .pet-name{font-weight:500;font-size:0.875rem}
        .pet-card .pet-meta{font-size:0.7rem;color:var(--gray-500);margin-top:2px}
        .empty-state{text-align:center;padding:3rem 1rem;color:var(--gray-400)}
        .empty-state h3{font-size:1rem;font-weight:600;color:var(--gray-600);margin-bottom:0.5rem}
        .empty-state .icon-big{font-size:48px;margin-bottom:1rem}
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:0.75rem 1.25rem;border-radius:var(--radius);font-size:0.85rem;color:var(--white);z-index:9999;animation:fadeIn .3s;max-width:90vw}
        .toast-success{background:var(--emerald-600)}
        .toast-error{background:var(--red-600)}
        .toast-info{background:var(--blue-700)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .loading{text-align:center;padding:3rem}
        .spinner{width:24px;height:24px;border:3px solid var(--gray-200);border-top-color:var(--emerald-500);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .switch-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem;border-radius:var(--radius);background:var(--gray-50)}
        .switch{width:40px;height:22px;border-radius:11px;background:var(--gray-300);position:relative;cursor:pointer;transition:background .2s;border:none;padding:0}
        .switch.active{background:var(--emerald-500)}
        .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--white);transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
        .switch.active::after{transform:translateX(18px)}
        .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
        @media(max-width:640px){.summary-grid{grid-template-columns:1fr 1fr}}
        .summary-card{background:var(--white);border:1px solid var(--gray-200);border-radius:0.75rem;padding:1.25rem;display:flex;align-items:center;gap:0.75rem}
        .summary-card .icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
        .summary-card .value{font-size:1.4rem;font-weight:700}
        .summary-card .label{font-size:0.75rem;color:var(--gray-500)}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:0.8rem}
        th{text-align:left;padding:0.5rem 0.75rem;font-weight:600;font-size:0.75rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-200)}
        td{padding:0.6rem 0.75rem;border-bottom:1px solid var(--gray-100)}
        tr:hover{background:var(--gray-50)}
        .day-card{border:1px solid var(--gray-200);border-radius:0.5rem;margin-bottom:0.5rem;overflow:hidden;background:var(--white)}
        .day-card-header{display:flex;align-items:center;gap:1rem;padding:1rem;cursor:pointer;transition:background .1s;flex-wrap:wrap}
        .day-card-header:hover{background:var(--gray-50)}
        .day-card-header .fecha{font-weight:600;min-width:90px}
        .day-card-header .ventas{color:var(--green-700);font-weight:600;min-width:80px}
        .day-card-header .pedidos-count{min-width:50px;font-size:0.85rem}
        .day-card-detail{border-top:1px solid var(--gray-100);display:none}
        .day-card-detail.open{display:block}
        .search-input{width:180px;padding:0.4rem 0.75rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:0.8rem;outline:none}
        .search-input:focus{border-color:var(--emerald-500)}
        .filter-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0.75rem;margin-bottom:1rem}
        textarea.form-control{resize:vertical;min-height:60px}
        select.form-control{appearance:auto}
        .admin-badge{display:inline-flex;align-items:center;gap:4px;background:var(--purple-100);color:var(--purple-800);padding:2px 10px;border-radius:9999px;font-size:0.7rem;font-weight:600}
        .loading-container{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
        .status-actions{display:flex;gap:0.3rem;flex-wrap:wrap}
        .filter-status{display:flex;gap:0.3rem;flex-wrap:wrap}
        .filter-status .btn{font-size:0.75rem;padding:0.25rem 0.75rem}
        .filter-status .btn.active{background:var(--emerald-600);color:var(--white);border-color:var(--emerald-600)}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.5rem;margin-bottom:1rem}
        .stat-item{background:var(--gray-50);padding:0.5rem 1rem;border-radius:0.5rem;text-align:center}
        .stat-item .stat-value{font-weight:700;font-size:1.1rem}
        .stat-item .stat-label{font-size:0.7rem;color:var(--gray-500)}
        .stat-item.pending .stat-value{color:var(--yellow-800)}
        .stat-item.progress .stat-value{color:var(--blue-700)}
        .stat-item.completed .stat-value{color:var(--green-700)}
        .stat-item.total .stat-value{color:var(--emerald-700)}
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <div style="text-align:center">
                <div style="display:inline-flex;align-items:center;gap:0.75rem;margin-bottom:2rem">
                    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:flex;align-items:center;justify-content:center;font-size:28px;">🐾</div>
                    <div style="text-align:left">
                        <h1 style="font-size:1.5rem;font-weight:700;color:#111827">AnimalPet</h1>
                        <p style="font-size:0.8rem;color:#6b7280">Comida Natural para Perros y Gatos</p>
                    </div>
                </div>
                <div class="spinner"></div>
                <p style="margin-top:1rem;color:#6b7280;font-size:0.875rem">Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        //  CONFIGURACIÓN SUPABASE
        // ═══════════════════════════════════════════════════════════════════
        const SUPABASE_URL = 'https://sshbuqfjiokfzagsfmce.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaGJ1cWZqaW9rZnphZ3NmbWNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjU5NzUsImV4cCI6MjA5OTgwMTk3NX0._-oy1JfxiVouSSIztv1UO_ufBNPg8h-LCDnDb3WW1l0';
        const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaGJ1cWZqaW9rZnphZ3NmbWNlIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDIyNTk3NSwiZXhwIjoyMDk5ODAxOTc1fQ.X3ZoxEXJZi2IE9zDkxnrXzauJTNEPXl3K6msXq0t5_s';

        console.log('🔌 Conectando a Supabase...');
        
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const sbAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
        
        console.log('✅ Clientes Supabase creados');

        // ═══════════════════════════════════════════════════════════════════
        //  ESTADO GLOBAL
        // ═══════════════════════════════════════════════════════════════════
        let state = {
            user: null,
            role: null,
            view: 'auth',
            tab: 'pedir',
            mascotas: [],
            pedidos: [],
            allPedidos: [],
            reporte: [],
            resumen: { total_general: 0, total_pedidos: 0, total_dias: 0 },
            search: '',
            desde: '',
            hasta: '',
            showPetForm: false,
            expandedId: null,
            expandedDay: null,
            loading: false,
            statusFilter: 'todos'
        };

        // Estados posibles
        const ESTADOS = {
            PENDIENTE: 'pendiente',
            PROCESO: 'en proceso',
            COMPLETADO: 'completado'
        };

        const ESTADO_BADGE = {
            'pendiente': 'badge-pending',
            'en proceso': 'badge-progress',
            'completado': 'badge-completed'
        };

        const ESTADO_ICON = {
            'pendiente': '⏳',
            'en proceso': '🔄',
            'completado': '✅'
        };

        const SABOR_COLOR = { 'Carne': 'badge-red', 'Pollo': 'badge-yellow', 'Mixta': 'badge-orange', 'Personalizada': 'badge-purple' };

        // ═══════════════════════════════════════════════════════════════════
        //  FUNCIONES AUXILIARES
        // ═══════════════════════════════════════════════════════════════════
        function esc(s) { 
            if (s == null) return ''; 
            const d = document.createElement('div'); 
            d.textContent = String(s); 
            return d.innerHTML; 
        }

        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function showLoading(show) {
            state.loading = show;
            render();
        }

        // ═══════════════════════════════════════════════════════════════════
        //  AUTENTICACIÓN
        // ═══════════════════════════════════════════════════════════════════
        async function getUserRole(userId, email) {
            console.log('🔍 Consultando rol para:', email);
            
            try {
                const { data: profile, error } = await sbAdmin
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (profile) {
                    console.log('✅ Perfil encontrado:', profile.role);
                    return profile.role;
                }

                console.log('📝 Creando perfil nuevo con rol user...');
                const { error: insertError } = await sbAdmin
                    .from('profiles')
                    .insert([{
                        id: userId,
                        email: email,
                        role: 'user'
                    }]);

                if (insertError) {
                    console.error('❌ Error creando perfil:', insertError);
                    return email.includes('admin') ? 'admin' : 'user';
                }

                console.log('✅ Perfil creado con rol user');
                return 'user';

            } catch (err) {
                console.error('❌ Error en getUserRole:', err);
                return email.includes('admin') ? 'admin' : 'user';
            }
        }

        async function initAuth() {
            console.log('🔍 Verificando sesión...');
            try {
                const { data: { session } } = await sb.auth.getSession();
                
                if (session) {
                    state.user = session.user;
                    const role = await getUserRole(session.user.id, session.user.email);
                    state.role = role;
                    state.view = role === 'admin' ? 'admin' : 'cliente';
                    
                    if (state.role === 'admin') {
                        state.tab = 'ventas';
                        await loadAdminData();
                    } else {
                        state.tab = 'pedir';
                        await loadClienteData();
                    }
                    
                    console.log('👤 Usuario:', session.user.email, '| Rol:', state.role);
                }
            } catch (err) {
                console.error('❌ Error verificando sesión:', err);
            }
            
            render();
        }

        sb.auth.onAuthStateChange(async (event, session) => {
            console.log('🔄 Cambio de estado auth:', event);
            
            if (session) {
                state.user = session.user;
                const role = await getUserRole(session.user.id, session.user.email);
                state.role = role;
                state.view = role === 'admin' ? 'admin' : 'cliente';
                
                if (state.role === 'admin') {
                    state.tab = 'ventas';
                    await loadAdminData();
                } else {
                    state.tab = 'pedir';
                    await loadClienteData();
                }
                
                console.log('👤 Sesión iniciada:', session.user.email, '| Rol:', state.role);
            } else {
                state.user = null;
                state.role = null;
                state.view = 'auth';
                state.tab = 'pedir';
                state.mascotas = [];
                state.pedidos = [];
                console.log('👋 Sesión cerrada');
            }
            
            render();
        });

        async function login(email, password) {
            showLoading(true);
            
            try {
                const { data, error } = await sb.auth.signInWithPassword({ 
                    email, 
                    password 
                });
                
                if (error) {
                    console.error('❌ Error login:', error.message);
                    toast(error.message, 'error');
                    showLoading(false);
                    return false;
                }
                
                console.log('✅ Login exitoso');
                
                if (!data.user) {
                    console.error('❌ No se recibió usuario después del login');
                    toast('Error al obtener datos del usuario', 'error');
                    showLoading(false);
                    return false;
                }
                
                state.user = data.user;
                console.log('👤 Usuario logueado:', state.user.email);
                
                const clienteOk = await ensureClienteExists();
                if (!clienteOk) {
                    console.error('❌ Error al asegurar la existencia del cliente');
                    toast('Error al configurar tu perfil. Intenta de nuevo.', 'error');
                    showLoading(false);
                    return false;
                }
                
                const role = await getUserRole(state.user.id, state.user.email);
                state.role = role;
                console.log('👤 Rol:', state.role);
                
                if (state.role === 'admin') {
                    state.view = 'admin';
                    state.tab = 'ventas';
                    await loadAdminData();
                } else {
                    state.view = 'cliente';
                    state.tab = 'pedir';
                    await loadClienteData();
                }
                
                render();

        async function ensureClienteExists() {
            if (!state.user) {

            const userEmail = state.user.email;
            const userMetadata = state.user.user_metadata || {};

            try {

        async function loadReporte() {
            try {
                // Solo contar pedidos COMPLETADOS para el reporte de ventas
                let q = sbAdmin
                    .from('pedidos')
                    .select(`
                        *, 
                        cliente:clientes(id,nombre_propietario,email,telefono),
                        mascota:mascotas(id,nombre,tipo,raza)
                    `)
                    .eq('estado', ESTADOS.COMPLETADO)
                    .order('fecha_entrega', { ascending: true });
                
                if (state.desde) q = q.gte('fecha_entrega', state.desde);
                if (state.hasta) q = q.lte('fecha_entrega', state.hasta);
                
                const { data, error } = await q;
                
                if (error) {
                    console.error('❌ Error cargando reporte:', error);
                    state.reporte = [];
                    state.resumen = { total_general: 0, total_pedidos: 0, total_dias: 0 };
                    return;
                }
                
                const pedidos = data || [];
                const dias = {};
                
                pedidos.forEach(p => {
                    if (!dias[p.fecha_entrega]) {
                        dias[p.fecha_entrega] = { 
                            fecha: p.fecha_entrega, 
                            total_ventas: 0, 
                            cantidad_pedidos: 0, 
                            pedidos: [] 
                        };
                    }
                    dias[p.fecha_entrega].total_ventas += Number(p.monto_total);
                    dias[p.fecha_entrega].cantidad_pedidos++;
                    dias[p.fecha_entrega].pedidos.push(p);
                });
                
                state.reporte = Object.values(dias).sort((a, b) => a.fecha.localeCompare(b.fecha));
                state.resumen = {
                    total_general: state.reporte.reduce((s, d) => s + d.total_ventas, 0),
                    total_pedidos: state.reporte.reduce((s, d) => s + d.cantidad_pedidos, 0),
                    total_dias: state.reporte.length,
                };
                
                console.log(`📊 Reporte: ${state.reporte.length} días, ${state.resumen.total_pedidos} pedidos`);
            } catch (err) {
                console.error('❌ Error en loadReporte:', err);
                state.reporte = [];
                state.resumen = { total_general: 0, total_pedidos: 0, total_dias: 0 };
            }
        }

        // ═══════════════════════════════════════════════════════════════════
        //  EVENTOS
        // ═══════════════════════════════════════════════════════════════════
        function bindEvents() {
            const authForm = document.getElementById('auth-form');
            if (authForm) {
                let isLogin = true;
                const toggle = document.getElementById('auth-toggle-link');
                const extra = document.getElementById('auth-extra-fields');
                const extra2 = document.getElementById('auth-extra-fields-2');
                const title = document.getElementById('auth-title');
                const sub = document.getElementById('auth-subtitle');
                const btn = document.getElementById('auth-btn');

                function setMode(login) {
                    isLogin = login;
                    if (login) {
                        title.textContent = '🔑 Iniciar Sesión';
                        sub.textContent = 'Accede a tu cuenta para hacer pedidos';
                        btn.textContent = '✅ Entrar';
                        extra.innerHTML = '';
                        extra2.innerHTML = '';
                        toggle.textContent = '¿No tienes cuenta? Regístrate';
                    } else {
                        title.textContent = '📝 Crear Cuenta';
                        sub.textContent = 'Regístrate para ordenar comida natural para tu mascota';
                        btn.textContent = '✅ Registrarse';
                        extra.innerHTML = `<div class="form-group"><label>✏️ Nombre Completo *</label><input name="nombre" class="form-control" placeholder="Tu nombre" required></div>`;
                        extra2.innerHTML = `<div class="form-group"><label>📞 Teléfono *</label><input name="telefono" class="form-control" placeholder="+58 412 1234567" required></div><div class="form-group"><label>📍 Dirección</label><textarea name="direccion" class="form-control" rows="2" placeholder="Dirección de entrega"></textarea></div>`;
                        toggle.textContent = '¿Ya tienes cuenta? Inicia sesión';
                    }
                }
                
                if (toggle) toggle.addEventListener('click', () => setMode(!isLogin));
                
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(authForm);
                    const email = fd.get('email');
                    const password = fd.get('password');
                    
                    if (isLogin) {
                        await login(email, password);
                    } else {
                        const nombre = fd.get('nombre');
                        const telefono = fd.get('telefono');
                        const direccion = fd.get('direccion');
                        await register(nombre, email, password, telefono, direccion);
                    }
                });
            }

            document.querySelectorAll('[data-tab]').forEach(el => {
                el.addEventListener('click', () => {
                    state.tab = el.dataset.tab;
                    state.showPetForm = false;
                    state.expandedId = null;
                    state.expandedDay = null;
                    state.statusFilter = 'todos';
                    render();
                    if (state.view === 'admin' && state.tab === 'reportes') {
                        loadReporte().then(() => render());
                    }
                });
            });

            // Filtros de estado en admin
            document.querySelectorAll('[data-status]').forEach(el => {
                el.addEventListener('click', () => {
                    state.statusFilter = el.dataset.status;
                    render();
                });
            });

            const orderForm = document.getElementById('order-form');
            if (orderForm) {
                orderForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(orderForm);
                    const obj = Object.fromEntries(fd);
                    await placeOrder(obj);
                });
            }

            const petForm = document.getElementById('pet-form');
            if (petForm) {
                petForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(petForm);
                    const obj = Object.fromEntries(fd);
                    const switchEl = document.getElementById('picky-switch');
                    obj.picky_eater = switchEl?.classList.contains('active') ? 'true' : 'false';
                    await savePet(obj);
                });
            }

            const addPetBtn = document.getElementById('btn-add-pet');
            if (addPetBtn) addPetBtn.addEventListener('click', () => { 
                state.showPetForm = true; 
                render(); 
            });
            
            const cancelPetBtn = document.getElementById('btn-cancel-pet');
            if (cancelPetBtn) cancelPetBtn.addEventListener('click', () => { 
                state.showPetForm = false; 
                render(); 
            });

            document.querySelectorAll('[data-expand]').forEach(el => {
                el.addEventListener('click', () => {
                    state.expandedId = state.expandedId === el.dataset.expand ? null : el.dataset.expand;
                    render();
                });
            });
            
            document.querySelectorAll('[data-expand-day]').forEach(el => {
                el.addEventListener('click', () => {
                    state.expandedDay = state.expandedDay === el.dataset.expandDay ? null : el.dataset.expandDay;
                    render();
                });
            });

            const searchInput = document.getElementById('admin-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    state.search = e.target.value;
                    render();
                });
            }

            const btnFiltrar = document.getElementById('btn-filtrar');
            if (btnFiltrar) {
                btnFiltrar.addEventListener('click', () => {
                    const desde = document.getElementById('filtro-desde');
                    const hasta = document.getElementById('filtro-hasta');
                    state.desde = desde ? desde.value : '';
                    state.hasta = hasta ? hasta.value : '';
                    loadReporte().then(() => render());
                });
            }
            
            const btnLimpiar = document.getElementById('btn-limpiar-filtro');
            if (btnLimpiar) {
                btnLimpiar.addEventListener('click', () => {
                    state.desde = '';
                    state.hasta = '';
                    state.reporte = [];
                    state.resumen = { total_general: 0, total_pedidos: 0, total_dias: 0 };
                    render();
                });
            }
            
            const desde = document.getElementById('filtro-desde');
            const hasta = document.getElementById('filtro-hasta');
            if (desde) desde.addEventListener('change', (e) => { state.desde = e.target.value; });
            if (hasta) hasta.addEventListener('change', (e) => { state.hasta = e.target.value; });
            
            document.querySelectorAll('.switch').forEach(el => {
                if (!el.id || el.id !== 'picky-switch') return;
                if (el._listener) return;
                el._listener = true;
                el.addEventListener('click', function(e) {
                    this.classList.toggle('active');
                    const hidden = this.parentElement.querySelector('input[type="hidden"]');
                    if (hidden) hidden.value = this.classList.contains('active') ? 'true' : 'false';
                    e.stopPropagation();
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        //  INICIAR
        // ═══════════════════════════════════════════════════════════════════
        console.log('🚀 Iniciando aplicación AnimalPet...');
        initAuth();
    </script>
</body>
</html>
