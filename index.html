<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gandolas - Comida Natural para Perros y Gatos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--emerald-50:#ecfdf5;--emerald-100:#d1fae5;--emerald-500:#10b981;--emerald-600:#059669;--emerald-700:#047857;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--white:#fff;--red-100:#fee2e2;--red-600:#dc2626;--red-700:#b91c1c;--red-800:#991b1b;--yellow-100:#fef3c7;--yellow-800:#92400e;--orange-100:#ffedd5;--orange-800:#9a3412;--purple-100:#f3e8ff;--purple-800:#6b21a8;--blue-100:#dbeafe;--blue-700:#1d4ed8;--green-100:#dcfce7;--green-700:#15803d;--amber-100:#fef3c7;--amber-600:#d97706;--indigo-100:#e0e7ff;--indigo-700:#4338ca;--radius:0.5rem}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;min-height:100vh}
        a{color:var(--emerald-600);text-decoration:none;cursor:pointer}
        button{cursor:pointer;font-family:inherit}
        input,select,textarea{font-family:inherit;font-size:0.875rem}
        .app{min-height:100vh;display:flex;flex-direction:column}
        .header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--gray-200);padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between}
        .header-logo{display:flex;align-items:center;gap:0.75rem}
        .header-logo .icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:flex;align-items:center;justify-content:center}
        .header-logo .icon svg{width:22px;height:22px;stroke:var(--white);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .header-logo h1{font-size:1.1rem;font-weight:700;color:var(--gray-900)}
        .header-logo p{font-size:0.7rem;color:var(--gray-500)}
        .main{flex:1;max-width:960px;width:100%;margin:0 auto;padding:1.5rem 1rem}
        .footer{border-top:1px solid var(--gray-200);background:rgba(255,255,255,.6);padding:1rem;text-align:center;margin-top:auto}
        .footer p{font-size:0.75rem;color:var(--gray-400)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.375rem;padding:0.5rem 1rem;border-radius:var(--radius);font-size:0.875rem;font-weight:500;border:none;transition:all .15s}
        .btn-primary{background:var(--emerald-600);color:var(--white)}.btn-primary:hover{background:var(--emerald-700)}
        .btn-outline{background:transparent;border:1px solid var(--gray-200);color:var(--gray-700)}.btn-outline:hover{background:var(--gray-50)}
        .btn-ghost{background:transparent;color:var(--gray-500)}.btn-ghost:hover{background:var(--gray-100)}
        .btn-danger{background:transparent;color:var(--red-600)}.btn-danger:hover{background:var(--red-100)}
        .btn-sm{padding:0.3rem 0.65rem;font-size:0.8rem}
        .btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .card{background:var(--white);border:1px solid var(--gray-200);border-radius:0.75rem;overflow:hidden}
        .card-header{padding:1rem 1.25rem;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem}
        .card-header h2{font-size:1rem;font-weight:600}
        .card-body{padding:1.25rem}
        .form-group{margin-bottom:0.75rem}
        .form-group label{display:block;font-size:0.8rem;font-weight:500;margin-bottom:0.25rem;color:var(--gray-700)}
        .form-control{width:100%;padding:0.5rem 0.75rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:0.875rem;transition:border-color .15s;outline:none}
        .form-control:focus{border-color:var(--emerald-500);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
        .form-row{display:grid;gap:0.75rem}
        .form-row-2{grid-template-columns:1fr 1fr}
        .form-row-3{grid-template-columns:1fr 1fr 1fr}
        @media(max-width:640px){.form-row-2,.form-row-3{grid-template-columns:1fr}}
        .auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem 1rem;background:linear-gradient(135deg,var(--emerald-50),var(--white))}
        .auth-card{width:100%;max-width:400px;background:var(--white);border-radius:0.75rem;box-shadow:0 10px 40px rgba(0,0,0,.08);border:1px solid var(--gray-200)}
        .auth-card .card-header{text-align:center;padding:1.5rem 1.5rem 0.5rem}
        .auth-card .card-body{padding:0.5rem 1.5rem 1.5rem}
        .auth-toggle{text-align:center;margin-top:1rem;font-size:0.8rem}
        .tabs{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:1.5rem}
        .tab{padding:0.6rem 1rem;font-size:0.8rem;font-weight:500;color:var(--gray-500);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .15s}
        .tab:hover{color:var(--gray-700)}
        .tab.active{color:var(--emerald-600);border-bottom-color:var(--emerald-600);font-weight:600}
        .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:0.7rem;font-weight:500}
        .badge-default{background:var(--gray-200);color:var(--gray-700)}
        .badge-red{background:var(--red-100);color:var(--red-800)}
        .badge-yellow{background:var(--yellow-100);color:var(--yellow-800)}
        .badge-orange{background:var(--orange-100);color:var(--orange-800)}
        .badge-purple{background:var(--purple-100);color:var(--purple-800)}
        .badge-green{background:var(--green-100);color:var(--green-700)}
        .badge-blue{background:var(--blue-100);color:var(--blue-700)}
        .sale-row{border:1px solid var(--gray-200);border-radius:0.5rem;margin-bottom:0.5rem;overflow:hidden;background:var(--white)}
        .sale-row-header{display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;padding:0.75rem 1rem;cursor:pointer;transition:background .1s}
        .sale-row-header:hover{background:var(--gray-50)}
        .sale-row-header .lote{font-family:monospace;font-size:0.7rem;background:var(--gray-100);padding:2px 6px;border-radius:4px}
        .sale-row-header .propietario{font-weight:600;font-size:0.85rem}
        .sale-row-header .monto{margin-left:auto;font-weight:700;color:var(--emerald-700);font-size:0.9rem}
        .sale-row-detail{border-top:1px solid var(--gray-100);padding:1rem;background:var(--gray-50);display:none}
        .sale-row-detail.open{display:block}
        .sale-row-detail .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
        .sale-row-detail h4{font-size:0.65rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);margin-bottom:0.4rem}
        .sale-row-detail .monto-big{font-size:1.1rem;font-weight:700;color:var(--emerald-700);margin-top:0.25rem}
        .pet-card{display:flex;align-items:center;justify-content:space-between;padding:0.75rem;border:1px solid var(--gray-200);border-radius:0.5rem;background:var(--white);margin-bottom:0.5rem}
        .pet-card .pet-info{display:flex;align-items:center;gap:0.75rem}
        .pet-card .pet-icon{width:36px;height:36px;border-radius:8px;background:var(--amber-100);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .pet-card .pet-icon svg{width:18px;height:18px;stroke:var(--amber-600);fill:none;stroke-width:2}
        .pet-card .pet-name{font-weight:500;font-size:0.875rem}
        .pet-card .pet-meta{font-size:0.7rem;color:var(--gray-500);margin-top:2px}
        .empty-state{text-align:center;padding:3rem 1rem;color:var(--gray-400)}
        .empty-state svg{width:48px;height:48px;stroke:var(--gray-300);fill:none;margin:0 auto 1rem;stroke-width:1.5}
        .empty-state h3{font-size:1rem;font-weight:600;color:var(--gray-600);margin-bottom:0.5rem}
        .toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:0.75rem 1.25rem;border-radius:var(--radius);font-size:0.85rem;color:var(--white);z-index:9999;animation:fadeIn .3s}
        .toast-success{background:var(--emerald-600)}
        .toast-error{background:var(--red-600)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .loading{text-align:center;padding:3rem}
        .spinner{width:24px;height:24px;border:3px solid var(--gray-200);border-top-color:var(--emerald-500);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .switch-row{display:flex;align-items:center;justify-content:space-between;padding:0.75rem;border-radius:var(--radius);background:var(--gray-50)}
        .switch{width:40px;height:22px;border-radius:11px;background:var(--gray-300);position:relative;cursor:pointer;transition:background .2s;border:none;padding:0}
        .switch.active{background:var(--emerald-500)}
        .switch::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--white);transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
        .switch.active::after{transform:translateX(18px)}
        .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
        @media(max-width:640px){.summary-grid{grid-template-columns:1fr}}
        .summary-card{background:var(--white);border:1px solid var(--gray-200);border-radius:0.75rem;padding:1.25rem;display:flex;align-items:center;gap:0.75rem}
        .summary-card .icon{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .summary-card .icon svg{width:20px;height:20px;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
        .summary-card .value{font-size:1.4rem;font-weight:700}
        .summary-card .label{font-size:0.75rem;color:var(--gray-500)}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;font-size:0.8rem}
        th{text-align:left;padding:0.5rem 0.75rem;font-weight:600;font-size:0.75rem;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-200)}
        td{padding:0.6rem 0.75rem;border-bottom:1px solid var(--gray-100)}
        tr:hover{background:var(--gray-50)}
        .day-card{border:1px solid var(--gray-200);border-radius:0.5rem;margin-bottom:0.5rem;overflow:hidden;background:var(--white)}
        .day-card-header{display:flex;align-items:center;gap:1rem;padding:1rem;cursor:pointer;transition:background .1s}
        .day-card-header:hover{background:var(--gray-50)}
        .day-card-header .fecha{font-weight:600;min-width:90px}
        .day-card-header .ventas{color:var(--green-700);font-weight:600;min-width:80px}
        .day-card-header .pedidos-count{min-width:50px;font-size:0.85rem}
        .day-card-detail{border-top:1px solid var(--gray-100);display:none}
        .day-card-detail.open{display:block}
        .search-input{width:180px;padding:0.4rem 0.75rem;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:0.8rem;outline:none}
        .search-input:focus{border-color:var(--emerald-500)}
        .filter-row{display:flex;flex-wrap:wrap;align-items:flex-end;gap:0.75rem;margin-bottom:1rem}
        textarea.form-control{resize:vertical;min-height:60px}
        select.form-control{appearance:auto}
        .admin-badge{display:inline-flex;align-items:center;gap:4px;background:var(--purple-100);color:var(--purple-800);padding:2px 10px;border-radius:9999px;font-size:0.7rem;font-weight:600}
    </style>
</head>
<body>
    <div id="app">
        <div class="auth-page">
            <div style="text-align:center">
                <div style="display:inline-flex;align-items:center;gap:0.75rem;margin-bottom:2rem">
                    <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--emerald-500),var(--emerald-700));display:flex;align-items:center;justify-content:center">
                        <svg width="22" height="22" viewBox="0 0 24 24" stroke="white" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-2 2.172-2.5 4-.29 2.662 2.003 5.074 4.5 6 .713.247 1.5.188 2.156-.112A8.01 8.01 0 0 0 15.5 10c.636-1.6 1.594-2.882 2.5-4 .7-.846 1.23-1.84 1.5-3 .321-1.486-.592-2.866-1.843-4.015A7.96 7.96 0 0 0 15 1.5c-1.472 0-2.845.522-4 1.672z"/>
                        </svg>
                    </div>
                    <div style="text-align:left">
                        <h1 style="font-size:1.5rem;font-weight:700;color:#111827">Gandolas</h1>
                        <p style="font-size:0.8rem;color:#6b7280">Comida Natural para Perros y Gatos</p>
                    </div>
                </div>
                <div class="spinner"></div>
                <p style="margin-top:1rem;color:#6b7280;font-size:0.875rem">Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        //  CONFIGURACIÓN SUPABASE
        // ═══════════════════════════════════════════════════════════════════
        const SUPABASE_URL = 'https://sshbuqfjiokfzagsfmce.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaGJ1cWZqaW9rZnphZ3NmbWNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMjU5NzUsImV4cCI6MjA5OTgwMTk3NX0._-oy1JfxiVouSSIztv1UO_ufBNPg8h-LCDnDb3WW1l0';
        const SUPABASE_SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzaGJ1cWZqaW9rZnphZ3NmbWNlIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4NDIyNTk3NSwiZXhwIjoyMDk5ODAxOTc1fQ.X3ZoxEXJZi2IE9zDkxnrXzauJTNEPXl3K6msXq0t5_s';

        console.log('🔌 Conectando a Supabase...');
        
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const sbAdmin = window.supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);
        
        console.log('✅ Clientes Supabase creados');

        // ═══════════════════════════════════════════════════════════════════
        //  ESTADO GLOBAL
        // ═══════════════════════════════════════════════════════════════════
        let state = {
            user: null,
            role: null,
            view: 'auth',
            tab: 'pedir',
            mascotas: [],
            pedidos: [],
            allPedidos: [],
            reporte: [],
            resumen: { total_general: 0, total_pedidos: 0, total_dias: 0 },
            search: '',
            desde: '',
            hasta: '',
            showPetForm: false,
            expandedId: null,
            expandedDay: null,
        };

        const SABOR_COLOR = { 'Carne': 'badge-red', 'Pollo': 'badge-yellow', 'Mixta': 'badge-orange', 'Personalizada': 'badge-purple' };

        // ═══════════════════════════════════════════════════════════════════
        //  ICONOS SVG
        // ═══════════════════════════════════════════════════════════════════
        const IC = {
            paw: '<svg viewBox="0 0 24 24"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-2 2.172-2.5 4-.29 2.662 2.003 5.074 4.5 6 .713.247 1.5.188 2.156-.112A8.01 8.01 0 0 0 15.5 10c.636-1.6 1.594-2.882 2.5-4 .7-.846 1.23-1.84 1.5-3 .321-1.486-.592-2.866-1.843-4.015A7.96 7.96 0 0 0 15 1.5c-1.472 0-2.845.522-4 1.672z"/></svg>',
            logout: '<svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
            plus: '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
            trash: '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
            shield: '<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>',
            bag: '<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>',
            chart: '<svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
            dollar: '<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
            package: '<svg viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>',
            calendar: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
            phone: '<svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
            x: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
            dog: '<svg viewBox="0 0 24 24"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-2 2.172-2.5 4-.29 2.662 2.003 5.074 4.5 6 .713.247 1.5.188 2.156-.112A8.01 8.01 0 0 0 15.5 10c.636-1.6 1.594-2.882 2.5-4 .7-.846 1.23-1.84 1.5-3 .321-1.486-.592-2.866-1.843-4.015A7.96 7.96 0 0 0 15 1.5c-1.472 0-2.845.522-4 1.672z"/></svg>',
            user: '<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
        };

        function icon(name, cls = '') { return `<span class="${cls}">${IC[name] || ''}</span>`; }
        function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
        function toast(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ═══════════════════════════════════════════════════════════════════
        //  AUTENTICACIÓN CON TABLA PROFILES
        // ═══════════════════════════════════════════════════════════════════
        
        /**
         * Obtiene el rol del usuario desde la tabla profiles
         * Si no existe, lo crea con rol 'user' por defecto
         */
        async function getUserRole(userId, email) {
            console.log('🔍 Consultando rol para:', email);
            
            try {
                // Buscar perfil existente
                const { data: profile, error } = await sbAdmin
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();

                if (profile) {
                    console.log('✅ Perfil encontrado:', profile.role);
                    return profile.role;
                }

                // Si no existe, crear perfil con rol 'user'
                console.log('📝 Creando perfil nuevo con rol user...');
                const { error: insertError } = await sbAdmin
                    .from('profiles')
                    .insert([{
                        id: userId,
                        email: email,
                        role: 'user'
                    }]);

                if (insertError) {
                    console.error('❌ Error creando perfil:', insertError);
                    // Fallback: si el email contiene 'admin', asignar admin
                    return email.includes('admin') ? 'admin' : 'user';
                }

                console.log('✅ Perfil creado con rol user');
                return 'user';

            } catch (err) {
                console.error('❌ Error en getUserRole:', err);
                // Fallback
                return email.includes('admin') ? 'admin' : 'user';
            }
        }

        /**
         * Actualiza el rol de un usuario en la tabla profiles
         */
        async function updateUserRole(userId, newRole) {
            console.log('🔄 Actualizando rol a:', newRole);
            
            const { error } = await sbAdmin
                .from('profiles')
                .upsert({
                    id: userId,
                    role: newRole,
                    email: state.user?.email
                }, { onConflict: 'id' });

            if (error) {
                console.error('❌ Error actualizando rol:', error);
                toast('Error al actualizar rol', 'error');
                return false;
            }

            console.log('✅ Rol actualizado exitosamente');
            toast('Rol actualizado correctamente');
            return true;
        }

        async function initAuth() {
            console.log('🔍 Verificando sesión...');
            try {
                const { data: { session } } = await sb.auth.getSession();
                console.log('📋 Sesión:', session ? 'Activa' : 'No hay sesión');
                
                if (session) {
                    state.user = session.user;
                    
                    // Obtener rol desde la tabla profiles
                    const role = await getUserRole(session.user.id, session.user.email);
                    state.role = role;
                    state.view = role === 'admin' ? 'admin' : 'cliente';
                    
                    if (state.role === 'admin') state.tab = 'ventas';
                    
                    console.log('👤 Usuario:', session.user.email, '| Rol:', state.role);
                    
                    if (state.role === 'cliente') await loadClienteData();
                    if (state.role === 'admin') await loadAdminData();
                }
            } catch (err) {
                console.error('❌ Error verificando sesión:', err);
            }
            
            render();
        }

        // Listener de cambios de autenticación
        sb.auth.onAuthStateChange(async (event, session) => {
            console.log('🔄 Cambio de estado auth:', event);
            
            if (session) {
                state.user = session.user;
                
                // Obtener rol desde profiles
                const role = await getUserRole(session.user.id, session.user.email);
                state.role = role;
                state.view = role === 'admin' ? 'admin' : 'cliente';
                
                if (state.role === 'admin') state.tab = 'ventas';
                
                console.log('👤 Sesión iniciada:', session.user.email, '| Rol:', state.role);
                
                if (state.role === 'cliente') await loadClienteData();
                if (state.role === 'admin') await loadAdminData();
            } else {
                state.user = null;
                state.role = null;
                state.view = 'auth';
                state.tab = 'pedir';
                console.log('👋 Sesión cerrada');
            }
            
            render();

        async function login(email, password) {
            console.log('🔑 Intentando login:', email);
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                console.error('❌ Error login:', error.message);
                return toast(error.message, 'error');
            }
            console.log('✅ Login exitoso');
        }

        async function register(nombre, email, password, telefono, direccion) {
            console.log('📝 Registrando usuario:', email);
            
            // 1. Crear usuario en Auth
            const { data: authUser, error: authErr } = await sbAdmin.auth.admin.createUser({
                email, 
                password, 
                email_confirm: true,
                user_metadata: { nombre, telefono, direccion }
            });
            
            if (authErr) {
                console.error('❌ Error creando auth user:', authErr);
                return toast(authErr.message, 'error');
            }

            const userId = authUser.user.id;
            console.log('✅ Auth user creado:', userId);

            // 2. Crear perfil con rol 'user'
            const { error: profileErr } = await sbAdmin
                .from('profiles')
                .insert([{
                    id: userId,
                    email: email,
                    role: 'user'
                }]);

            if (profileErr) {
                console.error('❌ Error creando perfil:', profileErr);
                // Limpiar usuario si falla
                await sbAdmin.auth.admin.deleteUser(userId);
                return toast('Error al crear el perfil', 'error');
            }

            console.log('✅ Perfil creado con rol user');

            // 3. Crear registro en clientes
            const { error: dbErr } = await sbAdmin.from('clientes').insert([{
                id: userId,
                nombre_propietario: nombre,
                email: email,
                telefono: telefono,
                direccion: direccion || null,
                rol: 'cliente'
            }]);
            
            if (dbErr) {
                console.error('❌ Error creando cliente:', dbErr);
                // Limpiar si falla
                await sbAdmin.from('profiles').delete().eq('id', userId);
                await sbAdmin.auth.admin.deleteUser(userId);
                return toast(dbErr.message, 'error');
            }

            console.log('✅ Cliente creado exitosamente');

            // 4. Auto login
            const { error: loginErr } = await sb.auth.signInWithPassword({ email, password });
            if (loginErr) {
                console.error('❌ Error auto-login:', loginErr);
                return toast(loginErr.message, 'error');
            }
            
            console.log('✅ Registro completo y sesión iniciada');
        }

        async function loadClienteData() {

            const uid = state.user.id;
            console.log('📊 Cargando datos del cliente:', uid);
            
            const [mRes, pRes] = await Promise.all([
                sbAdmin.from('mascotas').select('*').eq('cliente_id', uid).order('created_at', { ascending: false }),
                sbAdmin.from('pedidos').select('*, mascota:mascotas(id,nombre,tipo,raza,peso_kg)').eq('cliente_id', uid).order('created_at', { ascending: false }),
            ]);
            
            state.mascotas = mRes.data || [];
            state.pedidos = pRes.data || [];
            
            console.log(`📊 Datos cargados: ${state.mascotas.length} mascotas, ${state.pedidos.length} pedidos`);
        }

                tipo: form.tipo,

                sabor: form.sabor,
                periodo_porcion: form.periodo_porcion,

        async function loadAdminData() {
            console.log('📊 Cargando datos del admin...');
            const { data } = await sbAdmin.from('pedidos').select(`
                *, 
                cliente:clientes(id,nombre_propietario,email,telefono,direccion),
                mascota:mascotas(id,nombre,tipo,raza,peso_kg,actividad_fisica,picky_eater,condicion_medica,alergias)
            `).order('created_at', { ascending: false });
            
            state.allPedidos = data || [];
            console.log(`📊 ${state.allPedidos.length} pedidos cargados`);
        }

        async function loadReporte() {
            let q = sbAdmin.from('pedidos').select(`
                *, 
                cliente:clientes(id,nombre_propietario,email,telefono),
                mascota:mascotas(id,nombre,tipo,raza)
            `).order('fecha_entrega', { ascending: true });
            
            if (state.desde) q = q.gte('fecha_entrega', state.desde);
            if (state.hasta) q = q.lte('fecha_entrega', state.hasta);
            
            const { data } = await q;
            const pedidos = data || [];
            const dias = {};
            
            pedidos.forEach(p => {
                if (!dias[p.fecha_entrega]) {
                    dias[p.fecha_entrega] = { 
                        fecha: p.fecha_entrega, 
                        total_ventas: 0, 
                        cantidad_pedidos: 0, 
                        pedidos: [] 
                    };
                }
                dias[p.fecha_entrega].total_ventas += Number(p.monto_total);
                dias[p.fecha_entrega].cantidad_pedidos++;
                dias[p.fecha_entrega].pedidos.push(p);
            });
            
            state.reporte = Object.values(dias).sort((a, b) => a.fecha.localeCompare(b.fecha));
            state.resumen = {
                total_general: state.reporte.reduce((s, d) => s + d.total_ventas, 0),
                total_pedidos: state.reporte.reduce((s, d) => s + d.cantidad_pedidos, 0),
                total_dias: state.reporte.length,
            };
        }

        async function deleteRegistro(id) {
            if (!confirm('¿Eliminar este registro?')) return;
            
            const { data: ped } = await sbAdmin.from('pedidos')
                .select('mascota_id,cliente_id')
                .eq('id', id)
                .single();
                
            if (ped) {
                await sbAdmin.from('pedidos').delete().eq('id', id);
                await sbAdmin.from('mascotas').delete().eq('id', ped.mascota_id);
                
                const { data: other } = await sbAdmin.from('mascotas')
                    .select('id')
                    .eq('cliente_id', ped.cliente_id);
                    
                if (!other || other.length === 0) {
                    await sbAdmin.from('clientes').delete().eq('id', ped.cliente_id);
                }
            }
            
            toast('Eliminado');
            await loadAdminData();
            render();
        }

                    <div style="display:flex;gap:10px;align-items:center;">
                        <a href="admin_db/index.html" class="btn btn-outline btn-sm" style="text-decoration:none;">🗄️ Admin DB</a>
                        <button class="btn btn-ghost btn-sm" onclick="logout()">${icon('logout','btn-icon')} Salir</button>
                    </div>
                </div>
                <div class="main">
                    <div class="tabs">
                        <button class="tab ${state.tab==='ventas'?'active':''}" data-tab="ventas">${icon('bag','btn-icon')} Ventas</button>
                        <button class="tab ${state.tab==='reportes'?'active':''}" data-tab="reportes">${icon('chart','btn-icon')} Reportes</button>
                    </div>
                    <div id="tab-content">${state.tab === 'ventas' ? renderAdminVentas() : renderAdminReportes()}</div>
                </div>
                <div class="footer"><p>Gandolas Admin — Panel de Administración</p></div>
            </div>`;
        }

        function renderAdminVentas() {
            const filtered = state.allPedidos.filter(r => {
                if (!state.search) return true;
                const q = state.search.toLowerCase();
                return (r.cliente?.nombre_propietario||'').toLowerCase().includes(q) || 
                       (r.mascota?.nombre||'').toLowerCase().includes(q) || 
                       r.nro_lote.toLowerCase().includes(q);
            });
            
            let html = `<div class="card"><div class="card-header">
                <div style="display:flex;align-items:center;gap:0.75rem">
                    <div style="width:36px;height:36px;border-radius:8px;background:var(--emerald-100);display:flex;align-items:center;justify-content:center">${icon('bag')}</div>
                    <div><h2>Todas las Ventas</h2><p>${filtered.length} registros</p></div>
                </div>
                <input type="text" class="search-input" id="admin-search" placeholder="Buscar..." value="${esc(state.search)}">
            </div><div class="card-body">`;
            
            if (filtered.length === 0) {
                html += `<div class="empty-state"><p>${state.search ? 'Sin resultados' : 'No hay ventas registradas'}</p></div>`;
            } else {
                filtered.forEach(r => {
                    const isOpen = state.expandedId === r.id;
                    html += `<div class="sale-row">
                        <div class="sale-row-header" data-expand="${r.id}">
                            <span class="lote">${esc(r.nro_lote)}</span>
                            <span class="propietario">${esc(r.cliente?.nombre_propietario||'')}</span>
                            <span style="color:var(--gray-400)">/</span>
                            <span>${esc(r.mascota?.nombre||'')}</span>
                            <span class="badge ${SABOR_COLOR[r.sabor]||''}">${r.sabor}</span>
                            <span class="badge badge-default">${r.periodo_porcion}</span>
                            <span style="font-size:0.75rem;color:var(--gray-500)">${r.cantidad_gramos}g</span>
                            <span class="monto">$${Number(r.monto_total).toFixed(2)}</span>
                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteRegistro('${r.id}')">${icon('trash','btn-icon')}</button>
                            <span style="font-size:0.7rem;color:var(--gray-400)">${isOpen?'▲':'▼'}</span>
                        </div>
                        <div class="sale-row-detail ${isOpen?'open':''}">
                            <div class="detail-grid">
                                <div><h4>Propietario</h4><p><strong>${esc(r.cliente?.nombre_propietario||'')}</strong></p>
                                    ${r.cliente?.telefono ? `<p>${icon('phone','btn-icon')} ${esc(r.cliente.telefono)}</p>` : ''}
                                    ${r.cliente?.email ? `<p>${esc(r.cliente.email)}</p>` : ''}
                                    ${r.cliente?.direccion ? `<p>${esc(r.cliente.direccion)}</p>` : ''}</div>
                                <div><h4>Mascota</h4><p><strong>${esc(r.mascota?.nombre||'')} (${r.mascota?.tipo||''})</strong></p>
                                    <p>Peso: ${r.mascota?.peso_kg}kg · Actividad: ${r.mascota?.actividad_fisica||''}</p></div>
                                <div><h4>Pedido</h4>
                                    <p>Sabor: ${r.sabor} · ${r.periodo_porcion} (${r.cantidad_gramos}g)</p>
                                    <p>Pago: ${r.metodo_pago}</p>
                                    <p>${icon('calendar','btn-icon')} Entrega: ${r.fecha_entrega}</p>
                                    <div class="monto-big">$${Number(r.monto_total).toFixed(2)}</div></div>
                            </div>
                        </div>
                    </div>`;
                });
            }
            html += `</div></div>`;
            return html;
        }

        function renderAdminReportes() {
            let html = `
            <div class="summary-grid">
                <div class="summary-card"><div class="icon" style="background:var(--green-100)">${icon('dollar')}</div><div><div class="label">Total Ventas</div><div class="value">$${state.resumen.total_general.toFixed(2)}</div></div></div>
                <div class="summary-card"><div class="icon" style="background:var(--blue-100)">${icon('package')}</div><div><div class="label">Total Pedidos</div><div class="value">${state.resumen.total_pedidos}</div></div></div>
                <div class="summary-card"><div class="icon" style="background:var(--purple-100)">${icon('calendar')}</div><div><div class="label">Días con Ventas</div><div class="value">${state.resumen.total_dias}</div></div></div>
            </div>
            <div class="card">
                <div class="card-header">
                    <div style="display:flex;align-items:center;gap:0.75rem">
                        <div style="width:36px;height:36px;border-radius:8px;background:var(--indigo-100);display:flex;align-items:center;justify-content:center">${icon('chart')}</div>
                        <h2>Ventas por Día</h2>
                    </div>
                </div>
                <div class="card-body">
                    <div class="filter-row">
                        <div class="form-group" style="margin:0"><label>Desde</label><input type="date" class="form-control" id="filtro-desde" value="${state.desde}" style="width:160px"></div>
                        <div class="form-group" style="margin:0"><label>Hasta</label><input type="date" class="form-control" id="filtro-hasta" value="${state.hasta}" style="width:160px"></div>
                        <button class="btn btn-outline btn-sm" id="btn-filtrar">${icon('chart','btn-icon')} Filtrar</button>
                        ${(state.desde||state.hasta) ? `<button class="btn btn-ghost btn-sm" id="btn-limpiar-filtro">${icon('x','btn-icon')} Limpiar</button>` : ''}
                    </div>`;
            
            if (state.reporte.length === 0) {
                html += `<div class="empty-state"><p>${(state.desde||state.hasta) ? 'Sin datos para el período' : 'Selecciona un rango de fechas y haz clic en Filtrar'}</p></div>`;
            } else {
                state.reporte.forEach(d => {
                    const isOpen = state.expandedDay === d.fecha;
                    html += `<div class="day-card">
                        <div class="day-card-header" data-expand-day="${d.fecha}">
                            <span class="fecha">${d.fecha}</span>
                            <span style="width:1px;height:40px;background:var(--gray-200)"></span>
                            <span class="ventas">$${d.total_ventas.toFixed(2)}</span>
                            <span class="pedidos-count">${d.cantidad_pedidos} pedidos</span>
                            <span style="margin-left:auto;font-size:0.8rem;color:var(--gray-400)">${isOpen?'▲':'▼'}</span>
                        </div>
                        <div class="day-card-detail ${isOpen?'open':''}">
                            <div class="table-wrap"><table>
                                <thead><tr><th>Lote</th><th>Propietario</th><th>Mascota</th><th>Sabor</th><th>Monto</th></tr></thead>
                                <tbody>${d.pedidos.map(p => `<tr>
                                    <td>${esc(p.nro_lote)}</td>
                                    <td>${esc(p.cliente?.nombre_propietario||'-')}</td>
                                    <td>${esc(p.mascota?.nombre||'-')}</td>
                                    <td><span class="badge ${SABOR_COLOR[p.sabor]||''}">${p.sabor}</span></td>
                                    <td style="text-align:right;font-weight:600">$${Number(p.monto_total).toFixed(2)}</td>
                                </tr>`).join('')}</tbody>
                            </table></div>
                        </div>
                    </div>`;
                });
            }
            html += `</div></div>`;
            return html;
        }

        // ═══════════════════════════════════════════════════════════════════
        //  EVENTOS
        // ═══════════════════════════════════════════════════════════════════
        function bindEvents() {
            // Auth form
            const authForm = document.getElementById('auth-form');
            if (authForm) {
                let isLogin = true;
                const toggle = document.getElementById('auth-toggle-link');
                const extra = document.getElementById('auth-extra-fields');
                const extra2 = document.getElementById('auth-extra-fields-2');
                const title = document.getElementById('auth-title');
                const sub = document.getElementById('auth-subtitle');
                const btn = document.getElementById('auth-btn');

                function setMode(login) {
                    isLogin = login;
                    if (login) {
                        title.textContent = 'Iniciar Sesión';
                        sub.textContent = 'Accede a tu cuenta para hacer pedidos';
                        btn.textContent = 'Entrar';
                        extra.innerHTML = '';
                        extra2.innerHTML = '';
                        toggle.textContent = '¿No tienes cuenta? Regístrate';
                    } else {
                        title.textContent = 'Crear Cuenta';
                        sub.textContent = 'Regístrate para ordenar comida natural para tu mascota';
                        btn.textContent = 'Registrarse';
                        extra.innerHTML = `<div class="form-group"><label>Nombre Completo *</label><input name="nombre" class="form-control" placeholder="Tu nombre" required></div>`;
                        extra2.innerHTML = `<div class="form-group"><label>Teléfono *</label><input name="telefono" class="form-control" placeholder="+58 412 1234567" required></div><div class="form-group"><label>Dirección</label><textarea name="direccion" class="form-control" rows="2" placeholder="Dirección de entrega"></textarea></div>`;
                        toggle.textContent = '¿Ya tienes cuenta? Inicia sesión';
                    }
                }
                
                toggle.addEventListener('click', () => setMode(!isLogin));
                
                authForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(authForm);
                    const email = fd.get('email');
                    const password = fd.get('password');
                    
                    if (isLogin) {
                        await login(email, password);
                    } else {
                        const nombre = fd.get('nombre');
                        const telefono = fd.get('telefono');
                        const direccion = fd.get('direccion');
                        await register(nombre, email, password, telefono, direccion);
                    }
                });
            }

            // Tabs
            document.querySelectorAll('[data-tab]').forEach(el => {
                el.addEventListener('click', () => {
                    state.tab = el.dataset.tab;
                    state.showPetForm = false;
                    state.expandedId = null;
                    state.expandedDay = null;
                    render();
                    if (state.view === 'admin' && state.tab === 'reportes') loadReporte().then(() => render());
                });
            });

            // Order form
            const orderForm = document.getElementById('order-form');
            if (orderForm) {
                orderForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(orderForm);
                    await placeOrder(Object.fromEntries(fd));
                });
            }

            // Pet form
            const petForm = document.getElementById('pet-form');
            if (petForm) {
                petForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData(petForm);
                    const obj = Object.fromEntries(fd);
                    obj.picky_eater = document.getElementById('picky-switch')?.classList.contains('active') ? 'true' : 'false';
                    await savePet(obj);
                });
            }

            const addPetBtn = document.getElementById('btn-add-pet');
            if (addPetBtn) addPetBtn.addEventListener('click', () => { state.showPetForm = true; render(); });
            
            const cancelPetBtn = document.getElementById('btn-cancel-pet');
            if (cancelPetBtn) cancelPetBtn.addEventListener('click', () => { state.showPetForm = false; render(); });

            // Expand rows
            document.querySelectorAll('[data-expand]').forEach(el => {
                el.addEventListener('click', () => {
                    state.expandedId = state.expandedId === el.dataset.expand ? null : el.dataset.expand;
                    render();
                });
            });
            
            document.querySelectorAll('[data-expand-day]').forEach(el => {
                el.addEventListener('click', () => {
                    state.expandedDay = state.expandedDay === el.dataset.expandDay ? null : el.dataset.expandDay;
                    render();
                });
            });

            // Admin search
            const searchInput = document.getElementById('admin-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    state.search = e.target.value;
                    render();
                    const newInput = document.getElementById('admin-search');
                    if (newInput) { newInput.focus(); newInput.selectionStart = newInput.selectionEnd = newInput.value.length; }
                });
            }

            // Report filters
            const btnFiltrar = document.getElementById('btn-filtrar');
            if (btnFiltrar) btnFiltrar.addEventListener('click', () => loadReporte().then(() => render()));
            
            const btnLimpiar = document.getElementById('btn-limpiar-filtro');
            if (btnLimpiar) btnLimpiar.addEventListener('click', () => {
                state.desde = '';
                state.hasta = '';
                state.reporte = [];
                state.resumen = { total_general: 0, total_pedidos: 0, total_dias: 0 };
                render();
            });
            
            const desde = document.getElementById('filtro-desde');
            const hasta = document.getElementById('filtro-hasta');
            if (desde) desde.addEventListener('change', (e) => { state.desde = e.target.value; });
            if (hasta) hasta.addEventListener('change', (e) => { state.hasta = e.target.value; });
        }

        // ═══════════════════════════════════════════════════════════════════
        //  INICIAR APLICACIÓN
        // ═══════════════════════════════════════════════════════════════════
        console.log('🚀 Iniciando aplicación Gandolas...');
        console.log('📋 Tabla profiles configurada para gestión de roles');
        initAuth();
    </script>
</body>
</html>
